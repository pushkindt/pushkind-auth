name: Deploy development

on:
  push:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Build frontend assets
        working-directory: ./frontend
        run: npm run build
      - uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --all-features
      - uses: actions/upload-artifact@v4
        with:
          name: pushkind-auth-frontend-dist
          path: ./assets/dist
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: pushkind-auth
          path: ./target/release/pushkind-auth
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/download-artifact@v4
        with:
          name: pushkind-auth
          path: ./target/release/
      - uses: actions/download-artifact@v4
        with:
          name: pushkind-auth-frontend-dist
          path: ./assets/
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.CICD_PRIVATE_KEY }}
          name: id_rsa # optional
          known_hosts: ${{ secrets.CICD_KNOWN_HOSTS }}
          if_key_exists: fail # replace / ignore / fail; optional (defaults to fail)
      - name: Deploy
        run: |
          ssh cicd@users.pushkind.com "sudo /usr/bin/systemctl stop pushkind-auth.service"
          scp ./target/release/pushkind-auth cicd@users.pushkind.com:/var/www7/html/
          scp -r ./config/ cicd@users.pushkind.com:/var/www7/html/
          scp -r ./assets/ cicd@users.pushkind.com:/var/www7/html/
          scp -r ./migrations/ cicd@users.pushkind.com:/var/www7/html/
          ssh cicd@users.pushkind.com "cd /var/www7/html/ && /home/cicd/.cargo/bin/diesel migration run --database-url app.db"
          ssh cicd@users.pushkind.com "sudo /usr/bin/systemctl start pushkind-auth.service"
